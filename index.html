<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --amber: #e3b341;
    --red: #f85149;
    --purple: #bc8cff;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; overflow: hidden; }

  /* ── ROOM LIST ─────────────────────────────────────────────────────────── */
  #roomListView {
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  #roomListHeader {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #roomListHeader h1 { font-size: 15px; font-weight: 600; }
  #roomListHeader .spacer { flex: 1; }
  .rl-btn {
    background: var(--blue); border: none; border-radius: 6px;
    padding: 6px 14px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .rl-btn:hover { opacity: 0.88; }
  .rl-btn.ghost {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
  }
  .rl-btn.ghost:hover { border-color: var(--blue); color: var(--blue); }

  #roomCards {
    flex: 1; overflow-y: auto; padding: 20px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px; align-content: start;
  }

  .room-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .room-card:hover { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
  .room-card-top { display: flex; align-items: center; gap: 8px; }
  .room-card-name { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-card-status { display: flex; gap: 6px; }
  .room-status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #484f58; flex-shrink: 0;
  }
  .room-status-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .room-status-dot.on.qa { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
  .room-card-dirs { display: flex; flex-direction: column; gap: 4px; }
  .room-card-dir { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .room-card-dir-label { font-weight: 600; font-size: 10px; color: #484f58; width: 28px; flex-shrink: 0; }
  .room-card-dir-label.arch { color: #7c9eff; }
  .room-card-dir-label.dev  { color: #56d364; }
  .room-card-dir-label.qa   { color: var(--amber); }
  .room-card-dir-path { color: var(--text-dim); font-family: 'SF Mono','Fira Code',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-card-actions { display: flex; gap: 6px; margin-top: 2px; }
  .room-open-btn {
    flex: 1; padding: 5px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; color: var(--blue); font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .room-open-btn:hover { background: var(--border); }
  .room-delete-btn {
    padding: 5px 8px; background: transparent; border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-dim); font-size: 11px; cursor: pointer;
  }
  .room-delete-btn:hover { border-color: var(--red); color: var(--red); }

  .room-empty {
    grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--text-dim); font-size: 13px;
  }
  .room-empty p { margin-bottom: 16px; }

  /* ── NEW ROOM MODAL ────────────────────────────────────────────────────── */
  #newRoomModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #newRoomInner {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 24px; width: min(520px, calc(100vw - 40px));
  }
  #newRoomInner h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .nr-field { margin-bottom: 12px; }
  .nr-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  .nr-field label span { color: var(--text-dim); font-weight: 400; font-size: 10px; margin-left: 4px; }
  .nr-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 10px; color: var(--text); font-size: 12px;
    font-family: 'SF Mono','Fira Code',monospace; outline: none;
  }
  .nr-input:focus { border-color: var(--blue); }
  .nr-name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .nr-row { display: flex; gap: 8px; margin-bottom: 0; }
  .nr-silent { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
  .nr-silent input { accent-color: var(--amber); cursor: pointer; }
  .nr-actions { display: flex; gap: 8px; margin-top: 16px; }
  .nr-cancel { flex: 1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 12px; cursor: pointer; }
  .nr-cancel:hover { border-color: var(--border); color: var(--text); }
  .nr-create { flex: 2; padding: 8px; background: var(--blue); border: none; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .nr-create:hover { opacity: 0.88; }
  .nr-create:disabled { opacity: 0.4; cursor: default; }

  /* ── ROOM DETAIL ───────────────────────────────────────────────────────── */
  #roomDetailView {
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .hdr-back {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    padding: 4px 9px; color: var(--text-dim); font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .hdr-back:hover { border-color: var(--blue); color: var(--blue); }
  #roomNameWrap { display: flex; align-items: center; gap: 4px; min-width: 0; flex-shrink: 0; }
  #roomNameDisplay { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; cursor: pointer; }
  #roomNameDisplay:hover { color: var(--blue); }
  #roomNameInput {
    display: none; font-size: 13px; font-weight: 600; background: var(--bg3);
    border: 1px solid var(--blue); border-radius: 4px; padding: 2px 6px; color: var(--text); outline: none; width: 140px;
  }
  .hdr-dirs { flex: 1; display: flex; gap: 6px; min-width: 0; overflow: hidden; }
  .hdr-dir { display: flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px; min-width: 0; overflow: hidden; flex: 1; }
  .hdr-dir-label { font-size: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .hdr-dir-label.arch { color: #7c9eff; }
  .hdr-dir-label.dev  { color: #56d364; }
  .hdr-dir-label.qa   { color: var(--amber); }
  .hdr-dir-path { font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hdr-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; color: var(--blue); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .hdr-btn:hover { background: var(--border); }
  #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; flex-shrink: 0; transition: background 0.3s; }
  #statusDot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #statusLabel { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }
  .panel { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
  .panel + .panel { border-left: 1px solid var(--border); }
  .panel-header { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; }
  .panel-header .ph-status { margin-left: auto; font-size: 11px; font-weight: 400; color: var(--green); }
  .panel-header .ph-reconnect { margin-left: 4px; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text-dim); font-size: 11px; cursor: pointer; }
  .panel-header .ph-reconnect:hover { border-color: var(--blue); color: var(--blue); }

  .term-wrap { flex: 1; min-height: 0; overflow: hidden; background: #0a0e14; cursor: text; outline: 2px solid transparent; transition: outline-color 0.15s; }
  .term-wrap.focused { outline-color: #58a6ff; }
  .term-wrap .xterm { height: 100%; padding: 3px 4px; background: #0a0e14; }
  .term-wrap .xterm-viewport { overflow-y: auto !important; background: #0a0e14 !important; }
  .term-wrap .xterm-scroll-area { background: #0a0e14 !important; }
  .term-wrap .xterm-screen { cursor: text; background: #0a0e14; }
  .term-wrap .xterm-screen canvas { display: block; background: #0a0e14; }
  .term-wrap .xterm-rows { background: #0a0e14; }
  .xterm .xterm-helper-textarea { position: fixed !important; left: -4px !important; top: 0 !important; width: 1px !important; height: 1px !important; opacity: 0.001 !important; pointer-events: none !important; z-index: -1 !important; }

  /* ── SESSION PICKER ─────────────────────────────────────────────────────── */
  #sessionPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #sessionPickerInner { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: min(1100px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; overflow: hidden; }
  #sessionPickerTitle { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; flex-shrink: 0; }
  .session-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; min-height: 0; overflow: hidden; }
  .session-cols.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .session-cols > div { min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
  .session-col-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .session-col-title.arch { color: #7c9eff; }
  .session-col-title.dev  { color: #56d364; }
  .session-col-title.qa   { color: var(--amber); }
  .session-col-options { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
  .dir-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; outline: none; min-width: 0; }
  .dir-input:focus { border-color: var(--blue); }
  .silent-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); white-space: nowrap; cursor: pointer; user-select: none; }
  .silent-label input[type=checkbox] { accent-color: var(--amber); cursor: pointer; }
  .model-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; color: var(--text-dim); font-size: 11px; outline: none; cursor: pointer; }
  .model-select:focus { border-color: var(--blue); }
  .cli-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; color: var(--purple); font-size: 11px; outline: none; cursor: pointer; font-weight: 600; flex-shrink: 0; }
  .cli-select:focus { border-color: var(--purple); }
  .ph-model { margin-left: 6px; font-size: 10px; color: var(--text-dim); font-weight: 400; }
  .session-list-inner { display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 80px; overflow-y: auto; overflow-x: hidden; margin-bottom: 8px; }
  .session-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 9px 10px; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 7px; min-width: 0; overflow: hidden; flex-shrink: 0; }
  .session-item:hover { border-color: var(--blue); }
  .session-item.selected-arch { border-color: #7c9eff; background: #1a2340; }
  .session-item.selected-dev  { border-color: #56d364; background: #1a2e1a; }
  .session-item.selected-qa   { border-color: var(--amber); background: #2a2010; }
  .session-item-text { flex: 1; min-width: 0; overflow: hidden; }
  .session-item-first { font-size: 12px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .session-item-last  { font-size: 10px; color: var(--text-dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .new-btn { width: 100%; padding: 6px; background: transparent; border: 1px dashed var(--border); color: var(--text-dim); border-radius: 5px; cursor: pointer; font-size: 11px; transition: border-color 0.15s, color 0.15s; flex-shrink: 0; }
  .new-btn:hover { border-color: var(--green); color: var(--green); }
  #startBtn { margin-top: 14px; width: 100%; padding: 9px; background: var(--blue); border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  #startBtn:hover { opacity: 0.88; }
  #startBtn:disabled { opacity: 0.4; cursor: default; }

  /* ── RELAY BAR ─────────────────────────────────────────────────────────── */
  #relayBar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
  .relay-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 10px; color: var(--text-dim); font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
  .relay-btn:hover { border-color: var(--blue); color: var(--blue); }
  .relay-btn.ok  { border-color: var(--green); color: var(--green); }
  .relay-btn.err { border-color: var(--red);   color: var(--red); }
  #inboxBadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(227,179,65,0.15); border: 1px solid rgba(227,179,65,0.4); color: var(--amber); white-space: nowrap; display: none; }
  #watchdogBtn.active { border-color: var(--green); color: var(--green); }
  #watchdogBadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.35); color: var(--red); white-space: nowrap; display: none; }
  #watchdogBadge.done { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.4); color: var(--green); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── MEMORY PANEL ──────────────────────────────────────────────────────── */
  #memoryPanel { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #memoryPanelInner { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: min(640px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
  #memoryPanelInner h3 { font-size: 13px; font-weight: 600; color: var(--text); }
  .mem-section-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  #memoryTextarea { width: 100%; height: 160px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px; color: var(--text); font-size: 12px; font-family: 'SF Mono','Fira Code',monospace; resize: vertical; outline: none; }
  #memoryTextarea:focus { border-color: var(--blue); }
  .mem-actions { display: flex; gap: 8px; }
  .mem-save { padding: 6px 16px; background: var(--blue); border: none; border-radius: 5px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .mem-save:hover { opacity: 0.88; }
  .mem-close { padding: 6px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text-dim); font-size: 12px; cursor: pointer; }
  .mem-close:hover { border-color: var(--blue); color: var(--blue); }
  .mem-docs { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
  .mem-docs-group { font-size: 11px; }
  .mem-docs-group-label { color: var(--text-dim); margin-bottom: 3px; }
  .mem-docs-file { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-size: 10px; color: var(--text-dim); font-family: 'SF Mono','Fira Code',monospace; margin: 1px; }
  .mem-docs-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }
  #memoryBtn { position: relative; }
  #memoryDot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: none; }
</style>
</head>
<body>

<!-- ── ROOM LIST VIEW ────────────────────────────────────────────────────── -->
<div id="roomListView" style="display:none">
  <div id="roomListHeader">
    <h1>🏗 Supervisor</h1>
    <span class="spacer"></span>
    <button class="rl-btn" id="newRoomBtn">+ New Room</button>
  </div>
  <div id="roomCards"></div>
</div>

<!-- ── NEW ROOM MODAL ───────────────────────────────────────────────────── -->
<div id="newRoomModal" style="display:none">
  <div id="newRoomInner">
    <h2>New Room</h2>
    <div class="nr-field">
      <label>Room Name</label>
      <input class="nr-input nr-name" id="nrName" type="text" placeholder="My Project" />
    </div>
    <div class="nr-field">
      <label>产品架构师 Directory</label>
      <div class="nr-row">
        <input class="nr-input" id="nrArchDir" type="text" placeholder="/path/to/project" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrArchSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-field">
      <label>开发工程师 Directory</label>
      <div class="nr-row">
        <input class="nr-input" id="nrDevDir" type="text" placeholder="/path/to/project" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrDevSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-field">
      <label>QA 工程师 Directory <span>（可选）</span></label>
      <div class="nr-row">
        <input class="nr-input" id="nrQaDir" type="text" placeholder="/path/to/project（留空则不启用 QA）" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrQaSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-actions">
      <button class="nr-cancel" id="nrCancel">Cancel</button>
      <button class="nr-create" id="nrCreate">Create Room</button>
    </div>
  </div>
</div>

<!-- ── ROOM DETAIL VIEW ─────────────────────────────────────────────────── -->
<div id="roomDetailView" style="display:none">

  <div id="header">
    <button class="hdr-back" id="backBtn">← Rooms</button>
    <div id="roomNameWrap">
      <span id="roomNameDisplay" title="Click to rename">—</span>
      <input id="roomNameInput" type="text" />
    </div>
    <div class="hdr-dirs">
      <div class="hdr-dir">
        <span class="hdr-dir-label arch">PA</span>
        <span class="hdr-dir-path" id="archDirDisplay">—</span>
      </div>
      <div class="hdr-dir">
        <span class="hdr-dir-label dev">Dev</span>
        <span class="hdr-dir-path" id="devDirDisplay">—</span>
      </div>
      <div class="hdr-dir" id="qaDirHdr" style="display:none">
        <span class="hdr-dir-label qa">QA</span>
        <span class="hdr-dir-path" id="qaDirDisplay">—</span>
      </div>
    </div>
    <button class="hdr-btn" id="connectBtn">Sessions</button>
    <div id="statusDot"></div>
    <span id="statusLabel">Disconnected</span>
  </div>

  <!-- SESSION PICKER -->
  <div id="sessionPicker" style="display:none">
    <div id="sessionPickerInner">
      <div id="sessionPickerTitle">Sessions <span style="font-weight:400;font-size:11px;color:var(--text-dim)">— 选择或新建会话，然后点击开始</span></div>
      <div class="session-cols three-col" id="sessionCols">
        <div>
          <div class="session-col-title arch">🏛 产品架构师</div>
          <div class="session-col-options">
            <input class="dir-input" id="archDirInput" type="text" placeholder="/path/to/project" spellcheck="false" />
            <label class="silent-label" title="--dangerouslySkipPermissions"><input type="checkbox" id="archSilentChk" /> 静默</label>
          </div>
          <div class="session-col-options" style="margin-bottom:4px">
            <select class="cli-select" id="archCliSelect" title="CLI tool for Product Architect">
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="codex">Codex</option>
              <option value="kimi">Kimi</option>
            </select>
            <select class="model-select" id="archModelSelect" title="Model for Product Architect">

  <!-- Memory Panel -->
  <div id="memoryPanel" style="display:none">
    <div id="memoryPanelInner">
      <h3>📝 Room 记忆</h3>

        <div class="mem-section-title">Room 记忆（跨会话协作决策）</div>
        <textarea id="memoryTextarea" placeholder="记录跨会话的关键决策、任务状态、约定等…&#10;Agent 可通过 update-room-memory 脚本追加内容。"></textarea>
        <div class="mem-actions" style="margin-top:8px">
          <button class="mem-save" id="memorySaveBtn">保存</button>
          <button class="mem-close" id="memoryCloseBtn">关闭</button>
        </div>
      </div>

        <div class="mem-section-title">项目文档（ai-docs）</div>

      </div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
(function () {
  'use strict';

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Route: room list vs room detail ───────────────────────────────────────
  const roomId = new URLSearchParams(location.search).get('room');
  if (roomId) {
    document.getElementById('roomDetailView').style.display = 'flex';
    initRoomDetail(roomId);
  } else {
    document.getElementById('roomListView').style.display = 'flex';
    initRoomList();
  }

  // ══════════════════════════════════════════════════════════════════════════
  // ROOM LIST
  // ══════════════════════════════════════════════════════════════════════════
  function initRoomList() {
    const roomCards    = document.getElementById('roomCards');
    const newRoomBtn   = document.getElementById('newRoomBtn');
    const modal        = document.getElementById('newRoomModal');
    const nrName       = document.getElementById('nrName');
    const nrArchDir    = document.getElementById('nrArchDir');
    const nrDevDir     = document.getElementById('nrDevDir');
    const nrQaDir      = document.getElementById('nrQaDir');
    const nrArchSilent = document.getElementById('nrArchSilent');
    const nrDevSilent  = document.getElementById('nrDevSilent');
    const nrQaSilent   = document.getElementById('nrQaSilent');
    const nrCancel     = document.getElementById('nrCancel');
    const nrCreate     = document.getElementById('nrCreate');

    let pollTimer = null;

    async function loadRooms() {
      try {
        const list = await fetch('/rooms').then(r => r.json());
        renderRooms(list);
      } catch {}
    }

    function renderRooms(list) {
      roomCards.innerHTML = '';
      if (!list.length) {
        roomCards.innerHTML = `<div class="room-empty"><p>还没有任何 Room</p><button class="rl-btn" onclick="document.getElementById('newRoomBtn').click()">+ 创建第一个 Room</button></div>`;
        return;
      }
      for (const r of list) {
        const card = document.createElement('div');
        card.className = 'room-card';
        const qaDot = r.qaDir
          ? `<div class="room-status-dot qa ${r.qaAlive ? 'on' : ''}" title="QA ${r.qaAlive ? 'running' : 'stopped'}"></div>`
          : '';
        const qaDir = r.qaDir
          ? `<div class="room-card-dir"><span class="room-card-dir-label qa">QA</span><span class="room-card-dir-path">${escHtml(r.qaDir)}</span></div>`
          : '';
        card.innerHTML = `
          <div class="room-card-top">
            <div class="room-card-name">${escHtml(r.name)}</div>
            <div class="room-card-status">
              <div class="room-status-dot arch ${r.archAlive ? 'on' : ''}" title="PA ${r.archAlive ? 'running' : 'stopped'}"></div>
              <div class="room-status-dot ${r.devAlive ? 'on' : ''}" title="Dev ${r.devAlive ? 'running' : 'stopped'}"></div>
              ${qaDot}
            </div>
          </div>
          <div class="room-card-dirs">
            <div class="room-card-dir"><span class="room-card-dir-label arch">PA</span><span class="room-card-dir-path">${escHtml(r.archDir)}</span></div>
            <div class="room-card-dir"><span class="room-card-dir-label dev">Dev</span><span class="room-card-dir-path">${escHtml(r.devDir)}</span></div>
            ${qaDir}
          </div>
          <div class="room-card-actions">
            <button class="room-open-btn">Open →</button>
            <button class="room-delete-btn" title="Delete room">✕</button>
          </div>`;
        card.querySelector('.room-open-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          location.href = '/?room=' + r.id;
        });
        card.querySelector('.room-delete-btn').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm(`Delete room "${r.name}"? Running terminals will be killed.`)) return;
          await fetch('/rooms/' + r.id, { method: 'DELETE' });
          loadRooms();
        });
        card.addEventListener('click', () => { location.href = '/?room=' + r.id; });
        roomCards.appendChild(card);
      }
    }

    loadRooms();
    pollTimer = setInterval(loadRooms, 3000);
    window.addEventListener('beforeunload', () => clearInterval(pollTimer));

    newRoomBtn.addEventListener('click', () => {
      nrName.value = ''; nrArchDir.value = ''; nrDevDir.value = ''; nrQaDir.value = '';
      nrArchSilent.checked = false; nrDevSilent.checked = false; nrQaSilent.checked = false;
      modal.style.display = 'flex';
      setTimeout(() => nrName.focus(), 50);
    });
    nrCancel.addEventListener('click', () => { modal.style.display = 'none'; });
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    nrCreate.addEventListener('click', async () => {
      const archDir = nrArchDir.value.trim();
      const devDir  = nrDevDir.value.trim();
      const qaDir   = nrQaDir.value.trim() || null;
      if (!archDir || !devDir) { alert('请填写产品架构师和开发工程师的目录'); return; }
      nrCreate.disabled = true; nrCreate.textContent = '创建中…';
      try {
        const r = await fetch('/rooms', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: nrName.value.trim() || 'New Room', archDir, devDir, qaDir, archSilent: nrArchSilent.checked, devSilent: nrDevSilent.checked, qaSilent: nrQaSilent.checked }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
        const { room } = await r.json();
        modal.style.display = 'none';
        location.href = '/?room=' + room.id;
      } catch (e) {
        alert('创建失败: ' + e.message);
        nrCreate.disabled = false; nrCreate.textContent = 'Create Room';
      }
    });

    [nrName, nrArchDir, nrDevDir, nrQaDir].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') nrCreate.click(); }));
  }

  // ══════════════════════════════════════════════════════════════════════════
  // ROOM DETAIL
  // ══════════════════════════════════════════════════════════════════════════
  function initRoomDetail(roomId) {
    const ARCH_TERM_ID = roomId + '-arch';
    const DEV_TERM_ID  = roomId + '-dev';
    const QA_TERM_ID   = roomId + '-qa';

    const XTERM_THEME = {
      background:'#0a0e14', foreground:'#c9d1d9', cursor:'#58a6ff', cursorAccent:'#0a0e14',
      selectionBackground:'rgba(88,166,255,0.2)',
      black:'#0d1117', red:'#f85149', green:'#3fb950', yellow:'#e3b341',
      blue:'#58a6ff', magenta:'#bc8cff', cyan:'#39c5cf', white:'#c9d1d9',
      brightBlack:'#484f58', brightRed:'#ff7b72', brightGreen:'#56d364',
      brightYellow:'#e3b341', brightBlue:'#79c0ff', brightMagenta:'#d2a8ff',
      brightCyan:'#56d4dd', brightWhite:'#f0f6fc',
    };

    function createTerminal(containerId) {
      const container = document.getElementById(containerId);
      const term = new Terminal({
        theme: XTERM_THEME, fontFamily: '"SF Mono","Fira Code","Cascadia Code",Menlo,monospace',
        fontSize: 13, lineHeight: 1.25, cursorBlink: true, scrollback: 10000, allowTransparency: false,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      requestAnimationFrame(() => { try { fitAddon.fit(); } catch(e){} });
      const ro = new ResizeObserver(() => { try { fitAddon.fit(); } catch(e){} });
      ro.observe(container);
      const obj = { term, fitAddon, ws: null };
      container.addEventListener('mousedown', () => { term.focus(); container.classList.add('focused'); });
      container.addEventListener('click', () => term.focus());
      requestAnimationFrame(() => {
        const ta = container.querySelector('.xterm-helper-textarea');
        if (ta) {
          ta.addEventListener('focus', () => container.classList.add('focused'));
          ta.addEventListener('blur',  () => container.classList.remove('focused'));
        }
      });
      term.onData(data => { if (obj.ws && obj.ws.readyState === 1) obj.ws.send(data); });
      term.onResize(({ cols, rows }) => { if (obj.ws && obj.ws.readyState === 1) obj.ws.send(JSON.stringify({ type: 'resize', cols, rows })); });
      return obj;
    }

    const archObj = createTerminal('archTermEl');
    const devObj  = createTerminal('devTermEl');
    const qaObj   = createTerminal('qaTermEl');

    const archStatus = document.getElementById('archStatus');
    const devStatus  = document.getElementById('devStatus');
    const qaStatus   = document.getElementById('qaStatus');
    const archReconn = document.getElementById('archReconnect');
    const devReconn  = document.getElementById('devReconnect');
    const qaReconn   = document.getElementById('qaReconnect');

    function connectPtyWs(obj, termId, statusEl) {
      if (obj.ws) { try { obj.ws.close(); } catch(e){} obj.ws = null; }
      if (statusEl) statusEl.textContent = '⟳ 连接中…';
      const ws = new WebSocket('ws://localhost:3458/pty/' + termId);
      ws.binaryType = 'arraybuffer';
      obj.ws = ws;
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'resize', cols: obj.term.cols, rows: obj.term.rows }));
        if (statusEl) statusEl.textContent = '● connected';
        ws.onmessage = evt => obj.term.write(evt.data instanceof ArrayBuffer ? new Uint8Array(evt.data) : evt.data);
        ws.onclose = evt => { obj.ws = null; if (statusEl) statusEl.textContent = evt.code === 4001 ? '○ 未启动' : '○ disconnected'; };
      };
      ws.onclose = evt => {
        obj.ws = null;
        if (statusEl) statusEl.textContent = evt.code === 4001 ? '○ 未启动' : '○ disconnected';
      };
    }

    archReconn.addEventListener('click', () => connectPtyWs(archObj, ARCH_TERM_ID, archStatus));
    devReconn.addEventListener('click',  () => connectPtyWs(devObj,  DEV_TERM_ID,  devStatus));
    qaReconn.addEventListener('click',   () => connectPtyWs(qaObj,   QA_TERM_ID,   qaStatus));

    // ── Event WS ────────────────────────────────────────────────────────────
    const statusDot   = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    let eventWs = null;
    function connectEventWs() {
      if (eventWs) { try { eventWs.close(); } catch(e){} }
      eventWs = new WebSocket('ws://localhost:3458');
      eventWs.onopen  = () => { statusDot.classList.add('on'); statusLabel.textContent = 'Connected'; };
      eventWs.onclose = () => { statusDot.classList.remove('on'); statusLabel.textContent = 'Disconnected'; setTimeout(connectEventWs, 3000); };
      eventWs.onmessage = evt => {
        try {
          const d = JSON.parse(evt.data);
          if (d.type === 'inbox_delivered' || d.type === 'inbox_queued') {
            if (d.to && d.to.startsWith(roomId)) showInboxBadge(d.from, d.to, d.queueLen, d.priority);
          }
          if (d.type === 'pty_exited') {
            if (d.termId === ARCH_TERM_ID && archStatus) archStatus.textContent = '○ exited';
            if (d.termId === DEV_TERM_ID  && devStatus)  devStatus.textContent  = '○ exited';
            if (d.termId === QA_TERM_ID   && qaStatus)   qaStatus.textContent   = '○ exited';
          }
          if (d.type === 'watchdog_status' && d.roomId === roomId) {
            setWatchdogUI(d.enabled);
          }
          if (d.type === 'watchdog_triggered' && d.roomId === roomId) {
            const parts = d.issues.map(i => {
              const who = i.role === 'arch' ? '产品架构师' : i.role === 'qa' ? 'QA' : '开发者';
              if (i.issue === 'exited') return `${who} 进程已退出`;
              if (i.issue === 'idle')   return `${who} 停滞 ${i.idleMin}min`;
              return `${who} ${i.issue}`;
            });
            showWatchdogBadge('⏱ ' + parts.join(' / '), false);
          }
          if (d.type === 'watchdog_done' && d.roomId === roomId) {
            setWatchdogUI(false);
            showWatchdogBadge('✓ 任务已完成，Watchdog 已停止', true);
          }
          if (d.type === 'session_captured' && d.roomId === roomId) {
            if (currentRoom) currentRoom[`${d.role}SessionId`] = d.sessionId;
          }
          if (d.type === 'model_switched' && d.roomId === roomId) {
            const badge = d.role === 'arch' ? archModelBadge : d.role === 'qa' ? qaModelBadge : devModelBadge;
            setModelBadge(badge, d.model, d.cli || 'claude');
            // Reconnect PTY WS — server respawned the process
            const termId   = roomId + '-' + d.role;
            const obj      = d.role === 'arch' ? archObj : d.role === 'qa' ? qaObj : devObj;
            const statusEl = d.role === 'arch' ? archStatus : d.role === 'qa' ? qaStatus : devStatus;
            setTimeout(() => connectPtyWs(obj, termId, statusEl), 1500);
            const roleLabel = d.role === 'arch' ? 'PA' : d.role === 'qa' ? 'QA' : 'Dev';
            const shortModel = modelLabel(d.model) || 'Sonnet';
            showInboxBadge('system', roomId + '-' + d.role, 0, 'normal');
            inboxBadge.textContent = `${roleLabel} → ${shortModel} ↺`;
            inboxBadge.style.display = 'inline-block';
            clearTimeout(inboxBadgeTimer);
            inboxBadgeTimer = setTimeout(() => { inboxBadge.style.display = 'none'; }, 5000);
          }
        } catch {}
      };
    }

    // ── Room name editing ────────────────────────────────────────────────────
    const roomNameDisplay = document.getElementById('roomNameDisplay');
    const roomNameInput   = document.getElementById('roomNameInput');
    const archDirDisplay  = document.getElementById('archDirDisplay');
    const devDirDisplay   = document.getElementById('devDirDisplay');
    const qaDirDisplay    = document.getElementById('qaDirDisplay');
    const qaDirHdr        = document.getElementById('qaDirHdr');

    let currentRoom = null;
    async function loadRoom() {
      try {
        const rooms = await fetch('/rooms').then(r => r.json());
        currentRoom = rooms.find(r => r.id === roomId);
        if (!currentRoom) { alert('Room not found'); location.href = '/'; return null; }
        roomNameDisplay.textContent = currentRoom.name;
        archDirDisplay.textContent  = currentRoom.archDir;
        devDirDisplay.textContent   = currentRoom.devDir;
        document.title = 'Supervisor — ' + currentRoom.name;
        archDirInput.value    = currentRoom.archDir;
        devDirInput.value     = currentRoom.devDir;
        archSilentChk.checked = currentRoom.archSilent;
        devSilentChk.checked  = currentRoom.devSilent;
        const loadedArchCli = currentRoom.archCli || 'claude';
        const loadedDevCli  = currentRoom.devCli  || 'claude';
        archCliSelect.value = loadedArchCli;
        devCliSelect.value  = loadedDevCli;
        populateModelSelect(archModelSelect, loadedArchCli, currentRoom.archModel);
        populateModelSelect(devModelSelect,  loadedDevCli,  currentRoom.devModel);
        setModelBadge(archModelBadge, currentRoom.archModel, loadedArchCli);
        setModelBadge(devModelBadge,  currentRoom.devModel,  loadedDevCli);
        setWatchdogUI(currentRoom.watchdogEnabled || false);

        // Show QA UI if room has qaDir configured
        if (currentRoom.qaDir) {
          qaDirDisplay.textContent = currentRoom.qaDir;
          qaDirHdr.style.display = 'flex';
          document.getElementById('qaPanel').style.display = 'flex';
          document.getElementById('devToQaBtn').style.display = '';
          qaDirInput.value    = currentRoom.qaDir;
          qaSilentChk.checked = currentRoom.qaSilent || false;
          const loadedQaCli = currentRoom.qaCli || 'claude';
          qaCliSelect.value = loadedQaCli;
          populateModelSelect(qaModelSelect, loadedQaCli, currentRoom.qaModel);
          setModelBadge(qaModelBadge, currentRoom.qaModel, loadedQaCli);
        }

        // Restore saved session IDs as pre-selections
        if (currentRoom.archSessionId) selectedArch = currentRoom.archSessionId;
        if (currentRoom.devSessionId)  selectedDev  = currentRoom.devSessionId;
        if (currentRoom.qaSessionId)   selectedQa   = currentRoom.qaSessionId;

        return currentRoom;
      } catch { return null; }
    }

    roomNameDisplay.addEventListener('click', () => {
      roomNameInput.value = roomNameDisplay.textContent;
      roomNameDisplay.style.display = 'none';
      roomNameInput.style.display = 'block';
      roomNameInput.focus(); roomNameInput.select();
    });
    async function saveRoomName() {
      const name = roomNameInput.value.trim() || currentRoom?.name || 'Room';
      roomNameDisplay.textContent = name;
      roomNameInput.style.display = 'none';
      roomNameDisplay.style.display = '';
      if (name !== currentRoom?.name) {
        await fetch('/rooms/' + roomId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) }).catch(() => {});
        if (currentRoom) currentRoom.name = name;
        document.title = 'Supervisor — ' + name;
      }
    }
    roomNameInput.addEventListener('blur', saveRoomName);
    roomNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') roomNameInput.blur(); if (e.key === 'Escape') { roomNameInput.style.display = 'none'; roomNameDisplay.style.display = ''; } });

    document.getElementById('backBtn').addEventListener('click', () => { location.href = '/'; });

    // ── Session picker ───────────────────────────────────────────────────────
    const connectBtn      = document.getElementById('connectBtn');
    const sessionPicker   = document.getElementById('sessionPicker');
    const archSessionList = document.getElementById('archSessionList');
    const devSessionListEl= document.getElementById('devSessionList');
    const qaSessionListEl = document.getElementById('qaSessionList');
    const archDirInput    = document.getElementById('archDirInput');
    const devDirInput     = document.getElementById('devDirInput');
    const qaDirInput      = document.getElementById('qaDirInput');
    const archSilentChk   = document.getElementById('archSilentChk');
    const devSilentChk    = document.getElementById('devSilentChk');
    const qaSilentChk     = document.getElementById('qaSilentChk');
    const archModelSelect = document.getElementById('archModelSelect');
    const devModelSelect  = document.getElementById('devModelSelect');
    const qaModelSelect   = document.getElementById('qaModelSelect');
    const archCliSelect   = document.getElementById('archCliSelect');
    const devCliSelect    = document.getElementById('devCliSelect');
    const qaCliSelect     = document.getElementById('qaCliSelect');
    const archModelBadge  = document.getElementById('archModelBadge');
    const devModelBadge   = document.getElementById('devModelBadge');
    const qaModelBadge    = document.getElementById('qaModelBadge');
    const newArchBtn      = document.getElementById('newArchBtn');
    const newDevBtn       = document.getElementById('newDevBtn');
    const newQaBtn        = document.getElementById('newQaBtn');
    const startBtn        = document.getElementById('startBtn');

    const CLI_MODELS = {
      claude: [
        { value: 'claude-sonnet-4-6',        label: 'Sonnet 4.6' },
        { value: 'claude-opus-4-8',           label: 'Opus 4.8'   },
        { value: 'claude-haiku-4-5-20251001', label: 'Haiku 4.5'  },
      ],
      gemini: [
        { value: 'gemini-2.5-flash',        label: '2.5 Flash'        },
        { value: 'gemini-2.5-flash-lite',   label: '2.5 Flash Lite'   },
        { value: 'gemini-2.5-pro',          label: '2.5 Pro'          },
        { value: 'gemini-3-flash-preview',  label: '3 Flash Preview'  },
        { value: 'gemini-3-pro-preview',    label: '3 Pro Preview'    },
        { value: 'gemini-3.1-pro-preview',  label: '3.1 Pro Preview'  },
      ],
      codex: [
        { value: 'gpt-5.5',     label: 'GPT-5.5'      },
        { value: 'gpt-5.5-pro', label: 'GPT-5.5 Pro'  },
        { value: 'gpt-5.4',     label: 'GPT-5.4'      },
        { value: 'gpt-5.4-mini',label: 'GPT-5.4 Mini' },
        { value: 'o4-mini',     label: 'o4-mini'       },
        { value: 'o3',          label: 'o3'            },
      ],
      kimi: [
        { value: 'kimi-for-coding',   label: 'Kimi for Coding' },
        { value: 'kimi-k2.6',         label: 'k2.6'            },
        { value: 'kimi-k2.5',         label: 'k2.5'            },
        { value: 'moonshot-v1-8k',    label: 'v1-8k'           },
        { value: 'moonshot-v1-32k',   label: 'v1-32k'          },
        { value: 'moonshot-v1-128k',  label: 'v1-128k'         },
      ],
    };

    function populateModelSelect(modelSelectEl, cliName, currentModel) {
      const models = CLI_MODELS[cliName] || CLI_MODELS.claude;
      modelSelectEl.innerHTML = '';
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m.value; opt.textContent = m.label;
        modelSelectEl.appendChild(opt);
      }
      if (currentModel && models.some(m => m.value === currentModel)) modelSelectEl.value = currentModel;
      else modelSelectEl.value = models[0].value;
    }

    function modelLabel(model, cli) {
      if (!model) return (cli && cli !== 'claude') ? cli.charAt(0).toUpperCase() + cli.slice(1) : '';
      if (cli === 'gemini') {
        const m = (CLI_MODELS.gemini || []).find(x => x.value === model);
        return m ? m.label : 'Gemini';
      }
      if (cli === 'codex') {
        const m = (CLI_MODELS.codex || []).find(x => x.value === model);
        return m ? m.label : 'Codex';
      }
      if (cli === 'kimi') {
        const m = (CLI_MODELS.kimi || []).find(x => x.value === model);
        return m ? m.label : 'Kimi';
      }
      // Claude
      if (model === 'claude-sonnet-4-6') return '';
      if (model.includes('opus'))  return 'Opus';
      if (model.includes('haiku')) return 'Haiku';
      return model.split('-').pop();
    }

    function setModelBadge(badge, model, cli) {
      const label = modelLabel(model, cli);
      badge.textContent = label ? `[${label}]` : '';
      const isOpus   = model && model.includes('opus');
      const isNonClaude = cli && cli !== 'claude';
      badge.style.color = isNonClaude ? 'var(--purple)' : isOpus ? 'var(--amber)' : 'var(--text-dim)';
    }

    let selectedArch = null;
    let selectedDev  = null;
    let selectedQa   = null;

    let _archDirTimer = null, _devDirTimer = null, _qaDirTimer = null;
    archDirInput.addEventListener('input', () => {
      selectedArch = null; updateStartBtn();
      clearTimeout(_archDirTimer);
      _archDirTimer = setTimeout(() => loadSessionsFor('arch', archDirInput.value.trim()), 400);
    });
    devDirInput.addEventListener('input', () => {
      selectedDev = null; updateStartBtn();
      clearTimeout(_devDirTimer);
      _devDirTimer = setTimeout(() => loadSessionsFor('dev', devDirInput.value.trim()), 400);
    });
    qaDirInput.addEventListener('input', () => {
      selectedQa = null; updateStartBtn();
      clearTimeout(_qaDirTimer);
      _qaDirTimer = setTimeout(() => loadSessionsFor('qa', qaDirInput.value.trim()), 400);
    });

    function updateStartBtn() {
      startBtn.disabled = false;
      const a = selectedArch ? selectedArch.slice(0, 8) + '…' : '新建';
      const d = selectedDev  ? selectedDev.slice(0, 8)  + '…' : '新建';
      if (qaDirInput && qaDirInput.value.trim()) {
        const q = selectedQa ? selectedQa.slice(0, 8) + '…' : '新建';
        startBtn.textContent = `开始  (PA: ${a}  /  Dev: ${d}  /  QA: ${q})`;
      } else {
        startBtn.textContent = `开始  (PA: ${a}  /  Dev: ${d})`;
      }
    }
    archCliSelect.addEventListener('change', () => { populateModelSelect(archModelSelect, archCliSelect.value, null); updateStartBtn(); if (sessionPicker.style.display !== 'none') loadSessionsFor('arch', archDirInput.value.trim()); });
    devCliSelect.addEventListener('change',  () => { populateModelSelect(devModelSelect,  devCliSelect.value,  null); updateStartBtn(); if (sessionPicker.style.display !== 'none') loadSessionsFor('dev',  devDirInput.value.trim()); });
    qaCliSelect.addEventListener('change',   () => { populateModelSelect(qaModelSelect,   qaCliSelect.value,   null); updateStartBtn(); if (sessionPicker.style.display !== 'none') loadSessionsFor('qa',   qaDirInput.value.trim()); });
    archSilentChk.addEventListener('change', updateStartBtn);
    devSilentChk.addEventListener('change',  updateStartBtn);
    qaSilentChk.addEventListener('change',   updateStartBtn);

    function buildSessionItem(s, role) {
      const item = document.createElement('div');
      item.className = 'session-item';
      const dateStr = s.lastTs ? new Date(s.lastTs).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      item.innerHTML = `<div class="session-item-text"><div class="session-item-first">${escHtml(s.firstPrompt || '(无标题)')}</div><div class="session-item-last">${dateStr ? escHtml(dateStr) + ' · ' : ''}${escHtml(s.lastPrompt || '-')}</div></div>`;
      item.addEventListener('click', () => {
        const col = role === 'arch' ? archSessionList : role === 'qa' ? qaSessionListEl : devSessionListEl;
        col.querySelectorAll('.session-item').forEach(el => el.classList.remove('selected-arch', 'selected-dev', 'selected-qa'));
        item.classList.add(role === 'arch' ? 'selected-arch' : role === 'qa' ? 'selected-qa' : 'selected-dev');
        if (role === 'arch') selectedArch = s.sessionId;
        else if (role === 'qa') selectedQa = s.sessionId;
        else selectedDev = s.sessionId;
        updateStartBtn();
      });
      return item;
    }

    async function loadSessionsFor(role, dir) {
      const listEl = role === 'arch' ? archSessionList : role === 'qa' ? qaSessionListEl : devSessionListEl;
      if (!dir) { listEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:4px 0">请输入目录</div>'; return; }
      // Non-Claude CLIs use their own session management — no Claude session files to show
      const cliSel = role === 'arch' ? archCliSelect : role === 'qa' ? qaCliSelect : devCliSelect;
      if (cliSel.value !== 'claude') {
        listEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:4px 0">当前 CLI 不支持历史会话（将新建）</div>';
        if (role === 'arch') selectedArch = null;
        else if (role === 'qa') selectedQa = null;
        else selectedDev = null;
        updateStartBtn();
        return;
      }
      listEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:4px">加载中…</div>';
      // Keep previous selection stable during fetch — avoids "新建" flash
      updateStartBtn();
      try {
        const list = await fetch('/sessions?projectDir=' + encodeURIComponent(dir)).then(r => r.json());
        listEl.innerHTML = '';
        const savedId = role === 'arch' ? currentRoom?.archSessionId : role === 'qa' ? currentRoom?.qaSessionId : currentRoom?.devSessionId;
        if (!list.length) {
          listEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:4px 0">暂无历史会话</div>';
        } else {
          list.forEach(s => {
            const item = buildSessionItem(s, role);
            // Pre-select saved session
            if (savedId && s.sessionId === savedId) {
              item.classList.add(role === 'arch' ? 'selected-arch' : role === 'qa' ? 'selected-qa' : 'selected-dev');
              item.querySelector('.session-item-last').textContent = '(上次使用) · ' + (item.querySelector('.session-item-last').textContent || '');
              if (role === 'arch') selectedArch = s.sessionId;
              else if (role === 'qa') selectedQa = s.sessionId;
              else selectedDev = s.sessionId;
            }
            listEl.appendChild(item);
          });
          // Saved session not found in list — show warning
          if (savedId && !list.some(s => s.sessionId === savedId)) {
            const warn = document.createElement('div');
            warn.style.cssText = 'color:var(--amber);font-size:10px;padding:3px 0';
            warn.textContent = '⚠ 上次会话不存在，将新建';
            listEl.prepend(warn);
          }
        }
        updateStartBtn();
      } catch { listEl.innerHTML = '<div style="color:#f85149;font-size:11px">加载失败</div>'; }
    }

    connectBtn.addEventListener('click', () => {
      selectedArch = currentRoom?.archSessionId || null;
      selectedDev  = currentRoom?.devSessionId  || null;
      selectedQa   = currentRoom?.qaSessionId   || null;
      updateStartBtn();
      loadSessionsFor('arch', archDirInput.value.trim());
      loadSessionsFor('dev',  devDirInput.value.trim());
      if (qaDirInput.value.trim()) loadSessionsFor('qa', qaDirInput.value.trim());
      sessionPicker.style.display = 'flex';
    });
    sessionPicker.addEventListener('click', e => { if (e.target === sessionPicker) sessionPicker.style.display = 'none'; });
    newArchBtn.addEventListener('click', () => { archSessionList.querySelectorAll('.session-item').forEach(el => el.classList.remove('selected-arch')); selectedArch = null; updateStartBtn(); });
    newDevBtn.addEventListener('click',  () => { devSessionListEl.querySelectorAll('.session-item').forEach(el => el.classList.remove('selected-dev')); selectedDev  = null; updateStartBtn(); });
    newQaBtn.addEventListener('click',   () => { qaSessionListEl.querySelectorAll('.session-item').forEach(el => el.classList.remove('selected-qa'));  selectedQa   = null; updateStartBtn(); });

    startBtn.addEventListener('click', async () => {
      const archDir = archDirInput.value.trim();
      const devDir  = devDirInput.value.trim();
      const qaDir   = qaDirInput.value.trim() || null;
      if (!archDir || !devDir) { alert('请填写目录'); return; }

      sessionPicker.style.display = 'none';
      archObj.term.focus();
      try { archObj.fitAddon.fit(); } catch(e) {}
      try { devObj.fitAddon.fit();  } catch(e) {}
      if (qaDir) { try { qaObj.fitAddon.fit(); } catch(e) {} }

      // Update room dirs/cli/model if changed
      const dirChanged = currentRoom && (
        archDir !== currentRoom.archDir || devDir !== currentRoom.devDir ||
        archSilentChk.checked !== currentRoom.archSilent || devSilentChk.checked !== currentRoom.devSilent ||
        qaDir !== (currentRoom.qaDir || null) || qaSilentChk.checked !== (currentRoom.qaSilent || false) ||
        archCliSelect.value !== (currentRoom.archCli || 'claude') ||
        devCliSelect.value  !== (currentRoom.devCli  || 'claude') ||
        qaCliSelect.value   !== (currentRoom.qaCli   || 'claude')
      );
      if (dirChanged) {
        await fetch('/rooms/' + roomId, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            archDir, devDir, qaDir,
            archSilent: archSilentChk.checked, devSilent: devSilentChk.checked, qaSilent: qaSilentChk.checked,
            archCli: archCliSelect.value, devCli: devCliSelect.value, qaCli: qaCliSelect.value,
          }),
        }).catch(() => {});
        if (currentRoom) { currentRoom.archDir = archDir; currentRoom.devDir = devDir; currentRoom.qaDir = qaDir; currentRoom.archCli = archCliSelect.value; currentRoom.devCli = devCliSelect.value; currentRoom.qaCli = qaCliSelect.value; }
        archDirDisplay.textContent = archDir; devDirDisplay.textContent = devDir;
      }
      // Show QA panel if QA dir was provided (handles rooms that didn't originally have qaDir)
      if (qaDir) {
        qaDirHdr.style.display = 'flex';
        qaDirDisplay.textContent = qaDir;
        document.getElementById('qaPanel').style.display = 'flex';
        document.getElementById('devToQaBtn').style.display = '';
      }

      const cols = Math.min(archObj.term.cols, devObj.term.cols);
      const rows = Math.min(archObj.term.rows, devObj.term.rows);

      try {
        const r = await fetch('/rooms/' + roomId + '/spawn', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ archSessionId: selectedArch || null, devSessionId: selectedDev || null, qaSessionId: selectedQa || null, archModel: archModelSelect.value, devModel: devModelSelect.value, qaModel: qaModelSelect.value, archCli: archCliSelect.value, devCli: devCliSelect.value, qaCli: qaCliSelect.value, cols, rows }),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error || r.statusText); }
      } catch (e) {
        sessionPicker.style.display = 'flex';
        alert('启动失败: ' + e.message); return;
      }
      connectPtyWs(archObj, ARCH_TERM_ID, archStatus);
      connectPtyWs(devObj,  DEV_TERM_ID,  devStatus);
      if (qaDir) connectPtyWs(qaObj, QA_TERM_ID, qaStatus);
    });

    // ── Relay bar ────────────────────────────────────────────────────────────
    const inboxBadge    = document.getElementById('inboxBadge');
    const devToArchBtn  = document.getElementById('devToArchBtn');
    const devToQaBtn    = document.getElementById('devToQaBtn');
    const watchdogBtn   = document.getElementById('watchdogBtn');
    const watchdogBadge = document.getElementById('watchdogBadge');
    let inboxBadgeTimer    = null;
    let watchdogBadgeTimer = null;
    let watchdogActive     = false;

    function showInboxBadge(from, to, queueLen, priority) {
      clearTimeout(inboxBadgeTimer);
      const fromRole = from === 'arch' ? 'PA' : from === 'qa' ? 'QA' : from === 'dev' ? 'Dev' : from;
      const toRole   = to.endsWith('-arch') ? 'PA' : to.endsWith('-qa') ? 'QA' : 'Dev';
      const urgentTag = priority === 'urgent' ? ' 🚨' : '';
      const arrow    = `${fromRole} → ${toRole}${urgentTag}`;
      inboxBadge.textContent = queueLen ? `${arrow} (queued: ${queueLen})` : `${arrow} ✓`;
      inboxBadge.style.display = 'inline-block';
      // Urgent messages stay visible longer
      inboxBadgeTimer = setTimeout(() => { inboxBadge.style.display = 'none'; }, priority === 'urgent' ? 8000 : 4000);
    }

    function flashBtn(btn, ok) {
      btn.classList.add(ok ? 'ok' : 'err');
      setTimeout(() => btn.classList.remove('ok', 'err'), 1400);
    }

    function setWatchdogUI(enabled) {
      watchdogActive = enabled;
      watchdogBtn.textContent = enabled ? '⏱ 监控中 ⏹' : '⏱ Watchdog';
      watchdogBtn.classList.toggle('active', enabled);
    }

    watchdogBtn.addEventListener('click', async () => {
      const next = !watchdogActive;
      try {
        const r = await fetch('/rooms/' + roomId + '/watchdog', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: next }),
        });
        if (r.ok) setWatchdogUI(next);
      } catch {}
    });

    function showWatchdogBadge(msg, isDone) {
      clearTimeout(watchdogBadgeTimer);
      watchdogBadge.textContent = msg;
      watchdogBadge.className = isDone ? 'done' : '';
      watchdogBadge.style.display = 'inline-block';
      watchdogBadgeTimer = setTimeout(() => { watchdogBadge.style.display = 'none'; }, 8000);
    }

    devToArchBtn.addEventListener('click', async () => {
      try {
        const { text } = await fetch('/pty/buffer?termId=' + DEV_TERM_ID).then(r => r.json());
        if (!text.trim()) { flashBtn(devToArchBtn, false); return; }
        const res = await fetch('/notify', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: 'arch', from: 'dev', roomId, message: '[MANUAL REVIEW] Developer latest activity:\n' + text.trim().slice(-2000) }),
        });
        flashBtn(devToArchBtn, res.ok);
      } catch { flashBtn(devToArchBtn, false); }
    });

    devToQaBtn.addEventListener('click', async () => {
      try {
        const { text } = await fetch('/pty/buffer?termId=' + DEV_TERM_ID).then(r => r.json());
        if (!text.trim()) { flashBtn(devToQaBtn, false); return; }
        const res = await fetch('/notify', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: 'qa', from: 'arch', roomId, message: '[MANUAL QA REQUEST] Please test the Developer\'s recent work:\n' + text.trim().slice(-2000) }),
        });
        flashBtn(devToQaBtn, res.ok);
      } catch { flashBtn(devToQaBtn, false); }
    });

    // ── Memory panel ─────────────────────────────────────────────────────────
    const memoryBtn      = document.getElementById('memoryBtn');
    const memoryPanel    = document.getElementById('memoryPanel');
    const memoryTextarea = document.getElementById('memoryTextarea');
    const memorySaveBtn  = document.getElementById('memorySaveBtn');
    const memoryCloseBtn = document.getElementById('memoryCloseBtn');
    const memoryDocsList = document.getElementById('memoryDocsList');
    const memoryDot      = document.getElementById('memoryDot');

    async function openMemoryPanel() {
      memoryPanel.style.display = 'flex';
      memoryTextarea.value = '加载中…';
      memoryDocsList.innerHTML = '<div class="mem-docs-empty">加载中…</div>';
      try {
        const [memRes, infoRes] = await Promise.all([
          fetch(`/rooms/${roomId}/memory`).then(r => r.json()),
          fetch(`/rooms/${roomId}/memory?info=1`).then(r => r.json()),
        ]);
        memoryTextarea.value = memRes.content || '';
        memoryDot.style.display = memRes.content?.trim() ? 'block' : 'none';
        // Render ai-docs file lists
        memoryDocsList.innerHTML = '';
        const { archFiles = [], devFiles = [] } = infoRes;
        if (!archFiles.length && !devFiles.length) {
          memoryDocsList.innerHTML = '<div class="mem-docs-empty">未检测到 ai-docs 目录</div>';
        } else {
          if (archFiles.length) {
            const g = document.createElement('div'); g.className = 'mem-docs-group';
            g.innerHTML = `<div class="mem-docs-group-label">📁 archDir/ai-docs/</div>` +
              archFiles.map(f => `<span class="mem-docs-file">${escHtml(f)}</span>`).join('');
            memoryDocsList.appendChild(g);
          }
          if (devFiles.length) {
            const g = document.createElement('div'); g.className = 'mem-docs-group';
            g.innerHTML = `<div class="mem-docs-group-label">📁 devDir/ai-docs/</div>` +
              devFiles.map(f => `<span class="mem-docs-file">${escHtml(f)}</span>`).join('');
            memoryDocsList.appendChild(g);
          }
        }
      } catch { memoryTextarea.value = '加载失败'; }
    }

    memoryBtn.addEventListener('click', openMemoryPanel);
    memoryCloseBtn.addEventListener('click', () => { memoryPanel.style.display = 'none'; });
    memoryPanel.addEventListener('click', e => { if (e.target === memoryPanel) memoryPanel.style.display = 'none'; });

    memorySaveBtn.addEventListener('click', async () => {
      memorySaveBtn.textContent = '保存中…'; memorySaveBtn.disabled = true;
      try {
        await fetch(`/rooms/${roomId}/memory`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: memoryTextarea.value }),
        });
        memoryDot.style.display = memoryTextarea.value.trim() ? 'block' : 'none';
        memorySaveBtn.textContent = '✓ 已保存';
        setTimeout(() => { memorySaveBtn.textContent = '保存'; memorySaveBtn.disabled = false; }, 1500);
      } catch {
        memorySaveBtn.textContent = '保存失败';
        setTimeout(() => { memorySaveBtn.textContent = '保存'; memorySaveBtn.disabled = false; }, 1500);
      }
    });

    // Check on init whether room has memory (to show dot)
    fetch(`/rooms/${roomId}/memory`).then(r => r.json()).then(d => {
      if (d.content?.trim()) memoryDot.style.display = 'block';
    }).catch(() => {});

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const room = await loadRoom();
      connectEventWs();

      if (room?.archAlive) {
        connectPtyWs(archObj, ARCH_TERM_ID, archStatus);
      } else {
        if (archStatus) archStatus.textContent = '○ 未启动';
      }
      if (room?.devAlive) {
        connectPtyWs(devObj, DEV_TERM_ID, devStatus);
      } else {
        if (devStatus) devStatus.textContent = '○ 未启动';
      }
      if (room?.qaDir) {
        if (room?.qaAlive) {
          connectPtyWs(qaObj, QA_TERM_ID, qaStatus);
        } else {
          if (qaStatus) qaStatus.textContent = '○ 未启动';
        }
      }

      // Neither arch nor dev running → auto-open session picker
      if (!room?.archAlive && !room?.devAlive) {
        selectedArch = currentRoom?.archSessionId || null;
        selectedDev  = currentRoom?.devSessionId  || null;
        selectedQa   = currentRoom?.qaSessionId   || null;
        updateStartBtn();
        loadSessionsFor('arch', archDirInput.value.trim());
        loadSessionsFor('dev',  devDirInput.value.trim());
        if (qaDirInput.value.trim()) loadSessionsFor('qa', qaDirInput.value.trim());
        sessionPicker.style.display = 'flex';
      }
    }

    init();
  }

})();
</script>
</body>
</html>
