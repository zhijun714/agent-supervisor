<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --amber: #e3b341;
    --red: #f85149;
    --purple: #bc8cff;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; overflow: hidden; }

  /* ── ROOM SHELL (left tab bar + iframe area) ───────────────────────────── */
  #roomShellView { height: 100vh; display: flex; overflow: hidden; }
  #roomTabBar {
    width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #tabBarHeader {
    padding: 14px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; gap: 7px;
  }
  #openTabs { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .room-tab {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 7px;
    cursor: pointer; border: 1px solid transparent; color: var(--text-dim); font-size: 12px;
    transition: background 0.12s, border-color 0.12s;
  }
  .room-tab:hover { background: var(--bg3); }
  .room-tab.active { background: var(--bg3); border-color: var(--blue); color: var(--text); }
  .room-tab-dots { display: flex; gap: 4px; flex-shrink: 0; }
  .room-tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-tab-close {
    flex-shrink: 0; width: 16px; height: 16px; line-height: 14px; text-align: center;
    border-radius: 4px; color: var(--text-dim); font-size: 13px; opacity: 0; transition: opacity 0.12s;
  }
  .room-tab:hover .room-tab-close { opacity: 1; }
  .room-tab-close:hover { background: var(--border); color: var(--red); }
  #tabBarFooter { flex-shrink: 0; padding: 8px; border-top: 1px solid var(--border); }
  .tab-home-btn {
    width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .tab-home-btn:hover { border-color: var(--blue); color: var(--blue); }
  .tab-home-btn.active { border-color: var(--blue); color: var(--blue); }
  #shellMain { flex: 1; position: relative; overflow: hidden; }
  #shellMain > iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg); }
  #shellHome { position: absolute; inset: 0; overflow: hidden; display: flex; flex-direction: column; }

  @media (max-width: 768px) {
    #roomShellView { flex-direction: column; }
    #roomTabBar { width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  }

  /* ── ROOM LIST ─────────────────────────────────────────────────────────── */
  #roomListView {
    height: 100%; display: flex; flex-direction: column; overflow: hidden;
  }
  #roomListHeader {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #roomListHeader h1 { font-size: 15px; font-weight: 600; }
  #roomListHeader .spacer { flex: 1; }
  .rl-btn {
    background: var(--blue); border: none; border-radius: 6px;
    padding: 6px 14px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .rl-btn:hover { opacity: 0.88; }
  .rl-btn.ghost {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
  }
  .rl-btn.ghost:hover { border-color: var(--blue); color: var(--blue); }

  #roomCards {
    flex: 1; overflow-y: auto; padding: 20px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px; align-content: start;
  }

  .room-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .room-card:hover { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
  .room-card-top { display: flex; align-items: center; gap: 8px; }
  .room-card-name { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-card-status { display: flex; gap: 6px; }
  .room-status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #484f58; flex-shrink: 0;
  }
  .room-status-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .room-status-dot.on.qa { background: var(--amber); box-shadow: 0 0 5px var(--amber); }
  .room-card-dirs { display: flex; flex-direction: column; gap: 4px; }
  .room-card-dir { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .room-card-dir-label { font-weight: 600; font-size: 10px; color: #484f58; width: 28px; flex-shrink: 0; }
  .room-card-dir-label.arch { color: #7c9eff; }
  .room-card-dir-label.dev  { color: #56d364; }
  .room-card-dir-label.qa   { color: var(--amber); }
  .room-card-dir-path { color: var(--text-dim); font-family: 'SF Mono','Fira Code',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-card-actions { display: flex; gap: 6px; margin-top: 2px; }
  .room-open-btn {
    flex: 1; padding: 5px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; color: var(--blue); font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .room-open-btn:hover { background: var(--border); }
  .room-delete-btn {
    padding: 5px 8px; background: transparent; border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-dim); font-size: 11px; cursor: pointer;
  }
  .room-delete-btn:hover { border-color: var(--red); color: var(--red); }

  .room-empty {
    grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--text-dim); font-size: 13px;
  }
  .room-empty p { margin-bottom: 16px; }

  /* ── NEW ROOM MODAL ────────────────────────────────────────────────────── */
  #newRoomModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #newRoomInner {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 24px; width: min(520px, calc(100vw - 40px));
  }
  #newRoomInner h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .nr-field { margin-bottom: 12px; }
  .nr-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  .nr-field label span { color: var(--text-dim); font-weight: 400; font-size: 10px; margin-left: 4px; }
  .nr-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 10px; color: var(--text); font-size: 12px;
    font-family: 'SF Mono','Fira Code',monospace; outline: none;
  }
  .nr-input:focus { border-color: var(--blue); }
  .nr-name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .nr-row { display: flex; gap: 8px; margin-bottom: 0; }
  .nr-silent { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
  .nr-silent input { accent-color: var(--amber); cursor: pointer; }
  .nr-actions { display: flex; gap: 8px; margin-top: 16px; }
  .nr-cancel { flex: 1; padding: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 12px; cursor: pointer; }
  .nr-cancel:hover { border-color: var(--border); color: var(--text); }
  .nr-create { flex: 2; padding: 8px; background: var(--blue); border: none; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .nr-create:hover { opacity: 0.88; }
  .nr-create:disabled { opacity: 0.4; cursor: default; }

  /* ── ROOM DETAIL ───────────────────────────────────────────────────────── */
  #roomDetailView {
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .hdr-back {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    padding: 4px 9px; color: var(--text-dim); font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .hdr-back:hover { border-color: var(--blue); color: var(--blue); }
  #roomNameWrap { display: flex; align-items: center; gap: 4px; min-width: 0; flex-shrink: 0; }
  #roomNameDisplay { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; cursor: pointer; }
  #roomNameDisplay:hover { color: var(--blue); }
  #roomNameInput {
    display: none; font-size: 13px; font-weight: 600; background: var(--bg3);
    border: 1px solid var(--blue); border-radius: 4px; padding: 2px 6px; color: var(--text); outline: none; width: 140px;
  }
  .hdr-dirs { flex: 1; display: flex; gap: 6px; min-width: 0; overflow: hidden; }
  .hdr-dir { display: flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px; min-width: 0; overflow: hidden; flex: 1; }
  .hdr-dir-label { font-size: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .hdr-dir-label.arch { color: #7c9eff; }
  .hdr-dir-label.dev  { color: #56d364; }
  .hdr-dir-label.qa   { color: var(--amber); }
  .hdr-dir-path { font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hdr-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; color: var(--blue); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .hdr-btn:hover { background: var(--border); }
  #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; flex-shrink: 0; transition: background 0.3s; }
  #statusDot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #statusLabel { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }
  .panel { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
  .panel + .panel { border-left: 1px solid var(--border); }
  .panel-header { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; }
  .panel-header .ph-status { margin-left: auto; font-size: 11px; font-weight: 400; color: var(--green); }
  .panel-header .ph-reconnect { margin-left: 4px; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text-dim); font-size: 11px; cursor: pointer; }
  .panel-header .ph-reconnect:hover { border-color: var(--blue); color: var(--blue); }
  .panel-header .ph-restart { margin-left: 2px; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text-dim); font-size: 11px; cursor: pointer; display: none; }
  .panel-header .ph-restart:hover { border-color: var(--amber); color: var(--amber); }
  .panel-header .ph-clear { margin-left: 2px; background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--text-dim); font-size: 11px; cursor: pointer; }
  .panel-header .ph-clear:hover { border-color: var(--text-dim); color: var(--fg); }
  .panel-header .ph-model { cursor: pointer; }
  .panel-header .ph-model:hover { opacity: 0.75; }
  .model-pop { position: fixed; z-index: 9999; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.5); min-width: 180px; font-size: 12px; }
  .model-pop select { width: 100%; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 11px; margin-bottom: 8px; }
  .model-pop button { width: 100%; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px; font-size: 11px; cursor: pointer; }
  .model-pop button:hover { border-color: var(--blue); color: var(--blue); }

  /* Inbox queue preview panel */
  .inbox-overlay { position: fixed; inset: 0; z-index: 9990; background: rgba(0,0,0,.45); display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; }
  .inbox-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; width: min(560px, 92vw); max-height: 72vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  .inbox-panel-head { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 8px; flex-shrink: 0; }
  .inbox-panel-head h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .inbox-panel-body { overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .inbox-msg { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
  .inbox-msg-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 11px; color: var(--text-dim); }
  .inbox-msg-from { font-weight: 600; color: var(--blue); }
  .inbox-msg-urgent { font-size: 10px; background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.35); border-radius: 3px; padding: 1px 5px; }
  .inbox-msg-idx { margin-left: auto; color: var(--text-dim); font-size: 10px; }
  .inbox-msg-body { font-size: 11px; color: var(--text); line-height: 1.55; white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow-y: auto; }
  .inbox-panel-foot { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .inbox-panel-foot button { flex: 1; padding: 6px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg3); color: var(--text-dim); font-size: 12px; cursor: pointer; }
  .inbox-panel-foot button:hover { border-color: var(--blue); color: var(--blue); }
  .inbox-panel-foot .btn-clear { border-color: rgba(248,81,73,.4); color: var(--red); }
  .inbox-panel-foot .btn-clear:hover { background: rgba(248,81,73,.1); border-color: var(--red); }
  .ph-inbox-badge { display: none; margin-left: 4px; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; background: rgba(227,179,65,0.18); border: 1px solid rgba(227,179,65,0.5); color: var(--amber); cursor: pointer; white-space: nowrap; }
  .ph-inbox-badge:hover { background: rgba(227,179,65,0.32); }
  .ph-inbox-badge.has-urgent { background: rgba(248,81,73,0.15); border-color: rgba(248,81,73,0.45); color: var(--red); }

  .term-wrap { flex: 1; min-height: 0; overflow: hidden; background: #0a0e14; cursor: text; outline: 2px solid transparent; transition: outline-color 0.15s; padding-right: 6px; }
  .term-wrap.focused { outline-color: #58a6ff; }
  .term-wrap .xterm { height: 100%; padding: 3px 4px; background: #0a0e14; }
  .term-wrap .xterm-viewport { overflow-y: auto !important; background: #0a0e14 !important; scrollbar-width: none; }
  .term-wrap .xterm-viewport::-webkit-scrollbar { display: none; }
  .term-wrap .xterm-scroll-area { background: #0a0e14 !important; }
  .term-wrap .xterm-screen { cursor: text; background: #0a0e14; }
  .term-wrap .xterm-screen canvas { display: block; background: #0a0e14; }
  .term-wrap .xterm-rows { background: #0a0e14; }
  .xterm .xterm-helper-textarea { position: fixed !important; left: -4px !important; top: 0 !important; width: 1px !important; height: 1px !important; opacity: 0.001 !important; z-index: -1 !important; }

  /* ── SESSION PICKER ─────────────────────────────────────────────────────── */
  #sessionPicker { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #sessionPickerInner { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: min(1100px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; overflow: hidden; }
  #sessionPickerTitle { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; flex-shrink: 0; }
  .session-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; min-height: 0; overflow: hidden; }
  .session-cols.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .session-cols > div { min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
  .session-col-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .session-col-title.arch { color: #7c9eff; }
  .session-col-title.dev  { color: #56d364; }
  .session-col-title.qa   { color: var(--amber); }
  .session-col-options { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
  .dir-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; outline: none; min-width: 0; }
  .dir-input:focus { border-color: var(--blue); }
  .silent-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); white-space: nowrap; cursor: pointer; user-select: none; }
  .silent-label input[type=checkbox] { accent-color: var(--amber); cursor: pointer; }
  .model-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; color: var(--text-dim); font-size: 11px; outline: none; cursor: pointer; }
  .model-select:focus { border-color: var(--blue); }
  .cli-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; color: var(--purple); font-size: 11px; outline: none; cursor: pointer; font-weight: 600; flex-shrink: 0; }
  .cli-select:focus { border-color: var(--purple); }
  .ph-model { margin-left: 6px; font-size: 10px; color: var(--text-dim); font-weight: 400; }
  .session-list-inner { display: flex; flex-direction: column; gap: 5px; flex: 1; min-height: 80px; overflow-y: auto; overflow-x: hidden; margin-bottom: 8px; }
  .session-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 9px 10px; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 7px; min-width: 0; overflow: hidden; flex-shrink: 0; }
  .session-item:hover { border-color: var(--blue); }
  .session-item.selected-arch { border-color: #7c9eff; background: #1a2340; }
  .session-item.selected-dev  { border-color: #56d364; background: #1a2e1a; }
  .session-item.selected-qa   { border-color: var(--amber); background: #2a2010; }
  .session-item-text { flex: 1; min-width: 0; overflow: hidden; }
  .session-item-first { font-size: 12px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .session-item-last  { font-size: 10px; color: var(--text-dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .new-btn { width: 100%; padding: 6px; background: transparent; border: 1px dashed var(--border); color: var(--text-dim); border-radius: 5px; cursor: pointer; font-size: 11px; transition: border-color 0.15s, color 0.15s; flex-shrink: 0; }
  .new-btn:hover { border-color: var(--green); color: var(--green); }
  #startBtn { margin-top: 14px; width: 100%; padding: 9px; background: var(--blue); border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  #startBtn:hover { opacity: 0.88; }
  #startBtn:disabled { opacity: 0.4; cursor: default; }

  /* ── RELAY BAR ─────────────────────────────────────────────────────────── */
  #relayBar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
  .relay-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 10px; color: var(--text-dim); font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
  .relay-btn:hover { border-color: var(--blue); color: var(--blue); }
  .relay-btn.ok  { border-color: var(--green); color: var(--green); }
  .relay-btn.err { border-color: var(--red);   color: var(--red); }
  #inboxBadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(227,179,65,0.15); border: 1px solid rgba(227,179,65,0.4); color: var(--amber); white-space: nowrap; display: none; }
  #watchdogBtn.active { border-color: var(--green); color: var(--green); }
  #watchdogBadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.35); color: var(--red); white-space: nowrap; display: none; }
  #watchdogBadge.done { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.4); color: var(--green); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── MEMORY PANEL ──────────────────────────────────────────────────────── */
  #memoryPanel { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #memoryPanelInner { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: min(640px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
  #memoryPanelInner h3 { font-size: 13px; font-weight: 600; color: var(--text); }
  .mem-section-title { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  #memoryTextarea { width: 100%; height: 160px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 8px; color: var(--text); font-size: 12px; font-family: 'SF Mono','Fira Code',monospace; resize: vertical; outline: none; }
  #memoryTextarea:focus { border-color: var(--blue); }
  .mem-actions { display: flex; gap: 8px; }
  .mem-save { padding: 6px 16px; background: var(--blue); border: none; border-radius: 5px; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .mem-save:hover { opacity: 0.88; }
  .mem-close { padding: 6px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; color: var(--text-dim); font-size: 12px; cursor: pointer; }
  .mem-close:hover { border-color: var(--blue); color: var(--blue); }
  .mem-docs { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
  .mem-docs-group { font-size: 11px; }
  .mem-docs-group-label { color: var(--text-dim); margin-bottom: 3px; }
  .mem-docs-file { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-size: 10px; color: var(--text-dim); font-family: 'SF Mono','Fira Code',monospace; margin: 1px; }
  .mem-docs-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }
  #memoryBtn { position: relative; }
  #memoryDot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: none; }

  /* ── COMM PANEL ──────────────────────────────────────────────────────────── */
  #commPanel { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #commPanelInner { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: min(500px, calc(100vw - 40px)); max-height: calc(100vh - 40px); display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  #commPanelInner h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
  .comm-section { display: flex; flex-direction: column; gap: 8px; }
  .comm-field { display: flex; flex-direction: column; gap: 4px; }
  .comm-label { font-size: 11px; color: var(--text-dim); }
  .comm-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 7px 9px; color: var(--text); font-size: 12px; font-family: 'SF Mono','Fira Code',monospace; outline: none; }
  .comm-input:focus { border-color: var(--blue); }
  .comm-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
  .comm-select:focus { border-color: var(--blue); }
  .comm-env-tip { font-size: 11px; padding: 7px 10px; background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); border-radius: 5px; color: var(--amber); }
  .comm-status-row { display: flex; align-items: center; gap: 6px; }
  .comm-status-label { font-size: 11px; color: var(--text-dim); }
  .comm-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .comm-dot-on  { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .comm-dot-off { background: var(--text-dim); }
  .comm-dot-busy { background: var(--amber); animation: comm-blink 1s infinite; }
  @keyframes comm-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .comm-status-text { font-size: 11px; color: var(--text-dim); flex: 1; }
  .comm-error { font-size: 11px; color: var(--red); padding: 5px 8px; background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.2); border-radius: 4px; margin-top: 4px; word-break: break-word; }
  .comm-reconnect-btn { padding: 2px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 10px; cursor: pointer; }
  .comm-reconnect-btn:hover { border-color: var(--blue); color: var(--blue); }
  .comm-enable-row { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 12px; color: var(--text); }
  .comm-enable-row input { margin-top: 2px; flex-shrink: 0; }
  #commBtn { position: relative; }
  #commDot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: none; }

  /* ── MOBILE TAB BAR ──────────────────────────────────────────────────────── */
  #mobileTabs {
    display: none; gap: 4px; padding: 6px 10px;
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .mobile-tab {
    flex: 1; padding: 6px 2px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-dim); font-size: 12px; font-weight: 500;
    cursor: pointer; text-align: center; white-space: nowrap; transition: all 0.15s;
  }
  .mobile-tab[data-panel="arch"].active { background: rgba(124,158,255,0.12); border-color: #7c9eff; color: #7c9eff; }
  .mobile-tab[data-panel="dev"].active  { background: rgba(86,211,100,0.12);  border-color: #56d364; color: #56d364; }
  .mobile-tab[data-panel="qa"].active   { background: rgba(227,179,65,0.12);  border-color: var(--amber); color: var(--amber); }

  @media (max-width: 768px) {
    #mobileTabs { display: flex; }
    /* Hide dir bar — too cramped on mobile */
    .hdr-dirs { display: none; }
    /* Session picker: single-column scroll */
    .session-cols, .session-cols.three-col { grid-template-columns: 1fr !important; overflow-y: auto; gap: 20px; }
    /* Relay bar: horizontal scroll */
    #relayBar { overflow-x: auto; flex-wrap: nowrap; }
    #relayBar::-webkit-scrollbar { display: none; }
    /* Room cards: single column */
    #roomCards { grid-template-columns: 1fr; }
    /* New room modal: full width */
    #newRoomInner { padding: 16px; }
  }
</style>
</head>
<body>

<!-- ── ROOM LIST VIEW ────────────────────────────────────────────────────── -->
<div id="roomShellView" style="display:none">
  <aside id="roomTabBar">
    <div id="tabBarHeader">🏗 Supervisor</div>
    <div id="openTabs"></div>
    <div id="tabBarFooter">
      <button class="tab-home-btn active" id="homeTabBtn">🏠 房间列表 / 新建</button>
    </div>
  </aside>
  <div id="shellMain">
    <div id="shellHome">
      <div id="roomListView">
        <div id="roomListHeader">
          <h1>🏗 所有房间</h1>
          <span class="spacer"></span>
          <button class="rl-btn" id="newRoomBtn">+ New Room</button>
        </div>
        <div id="roomCards"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── NEW ROOM MODAL ───────────────────────────────────────────────────── -->
<div id="newRoomModal" style="display:none">
  <div id="newRoomInner">
    <h2>New Room</h2>
    <div class="nr-field">
      <label>Room Name</label>
      <input class="nr-input nr-name" id="nrName" type="text" placeholder="My Project" />
    </div>
    <div class="nr-field">
      <label>产品架构师 Directory <span>（可选）</span></label>
      <div class="nr-row">
        <input class="nr-input" id="nrArchDir" type="text" placeholder="/path/to/project（留空则不启用 PA）" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrArchSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-field">
      <label>开发工程师 Directory <span>（可选）</span></label>
      <div class="nr-row">
        <input class="nr-input" id="nrDevDir" type="text" placeholder="/path/to/project（留空则不启用 Dev）" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrDevSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-field">
      <label>QA 工程师 Directory <span>（可选）</span></label>
      <div class="nr-row">
        <input class="nr-input" id="nrQaDir" type="text" placeholder="/path/to/project（留空则不启用 QA）" spellcheck="false" />
        <label class="nr-silent"><input type="checkbox" id="nrQaSilent" /> 静默</label>
      </div>
    </div>
    <div class="nr-actions">
      <button class="nr-cancel" id="nrCancel">Cancel</button>
      <button class="nr-create" id="nrCreate">Create Room</button>
    </div>
  </div>
</div>

<!-- ── ROOM DETAIL VIEW ─────────────────────────────────────────────────── -->
<div id="roomDetailView" style="display:none">

  <div id="header">
    <button class="hdr-back" id="backBtn">← Rooms</button>
    <div id="roomNameWrap">
      <span id="roomNameDisplay" title="Click to rename">—</span>
      <input id="roomNameInput" type="text" />
    </div>
    <div class="hdr-dirs">
      <div class="hdr-dir" id="archDirHdr">
        <span class="hdr-dir-label arch">PA</span>
        <span class="hdr-dir-path" id="archDirDisplay">—</span>
      </div>
      <div class="hdr-dir" id="devDirHdr">
        <span class="hdr-dir-label dev">Dev</span>
        <span class="hdr-dir-path" id="devDirDisplay">—</span>
      </div>
      <div class="hdr-dir" id="qaDirHdr" style="display:none">
        <span class="hdr-dir-label qa">QA</span>
        <span class="hdr-dir-path" id="qaDirDisplay">—</span>
      </div>
    </div>
    <button class="hdr-btn" id="connectBtn">Sessions</button>
    <div id="statusDot"></div>
    <span id="statusLabel">Disconnected</span>
  </div>

  <!-- SESSION PICKER -->
  <div id="sessionPicker" style="display:none">
    <div id="sessionPickerInner">
      <div id="sessionPickerTitle">Sessions <span style="font-weight:400;font-size:11px;color:var(--text-dim)">— 选择或新建会话，然后点击开始</span></div>
      <div class="session-cols three-col" id="sessionCols">
        <div>
          <div class="session-col-title arch">🏛 产品架构师 <span style="font-weight:400;color:var(--text-dim);font-size:10px">(可选)</span></div>
          <div class="session-col-options">
            <input class="dir-input" id="archDirInput" type="text" placeholder="留空则不启用 PA" spellcheck="false" />
            <label class="silent-label" title="--dangerouslySkipPermissions"><input type="checkbox" id="archSilentChk" /> 静默</label>
          </div>
          <div class="session-col-options" style="margin-bottom:4px">
            <select class="cli-select" id="archCliSelect" title="CLI tool for Product Architect">
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="codex">Codex</option>
              <option value="kimi">Kimi</option>
            </select>
            <select class="model-select" id="archModelSelect" title="Model for Product Architect">
              <option value="claude-sonnet-4-6">Sonnet 4.6</option>
              <option value="claude-opus-4-8">Opus 4.8</option>
              <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
            </select>
          </div>
          <div class="session-list-inner" id="archSessionList"></div>
          <button class="new-btn" id="newArchBtn">＋ 新建产品架构师会话</button>
        </div>
        <div>
          <div class="session-col-title dev">🧑‍💻 开发工程师 <span style="font-weight:400;color:var(--text-dim);font-size:10px">(可选)</span></div>
          <div class="session-col-options">
            <input class="dir-input" id="devDirInput" type="text" placeholder="留空则不启用 Dev" spellcheck="false" />
            <label class="silent-label" title="--dangerouslySkipPermissions"><input type="checkbox" id="devSilentChk" /> 静默</label>
          </div>
          <div class="session-col-options" style="margin-bottom:4px">
            <select class="cli-select" id="devCliSelect" title="CLI tool for Developer">
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="codex">Codex</option>
              <option value="kimi">Kimi</option>
            </select>
            <select class="model-select" id="devModelSelect" title="Model for Developer">
              <option value="claude-sonnet-4-6">Sonnet 4.6</option>
              <option value="claude-opus-4-8">Opus 4.8</option>
              <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
            </select>
          </div>
          <div class="session-list-inner" id="devSessionList"></div>
          <button class="new-btn" id="newDevBtn">＋ 新建开发工程师会话</button>
        </div>
        <div id="qaSessionCol">
          <div class="session-col-title qa">🔍 QA 工程师 <span style="font-weight:400;color:var(--text-dim);font-size:10px">(可选)</span></div>
          <div class="session-col-options">
            <input class="dir-input" id="qaDirInput" type="text" placeholder="留空则不启用 QA" spellcheck="false" />
            <label class="silent-label" title="--dangerouslySkipPermissions"><input type="checkbox" id="qaSilentChk" /> 静默</label>
          </div>
          <div class="session-col-options" style="margin-bottom:4px">
            <select class="cli-select" id="qaCliSelect" title="CLI tool for QA Engineer">
              <option value="claude">Claude</option>
              <option value="gemini">Gemini</option>
              <option value="codex">Codex</option>
              <option value="kimi">Kimi</option>
            </select>
            <select class="model-select" id="qaModelSelect" title="Model for QA Engineer">
              <option value="claude-sonnet-4-6">Sonnet 4.6</option>
              <option value="claude-opus-4-8">Opus 4.8</option>
              <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
            </select>
          </div>
          <div class="session-list-inner" id="qaSessionList"></div>
          <button class="new-btn" id="newQaBtn">＋ 新建 QA 会话</button>
        </div>
      </div>
      <button id="startBtn" disabled>开始</button>
    </div>
  </div>

  <div id="mobileTabs">
    <button class="mobile-tab active" data-panel="arch">🏛 架构师</button>
    <button class="mobile-tab" data-panel="dev">🧑‍💻 开发</button>
    <button class="mobile-tab" data-panel="qa" id="mobileQaTab" style="display:none">🔍 QA</button>
  </div>

  <div id="main">
    <div class="panel" id="archPanel">
      <div class="panel-header">
        🏛 产品架构师
        <span class="ph-model" id="archModelBadge"></span>
        <span class="ph-inbox-badge" id="archInboxBadge" title="查看积压消息详情"></span>
        <span class="ph-status" id="archStatus"></span>
        <button class="ph-reconnect" id="archReconnect" title="Reconnect">⟳</button>
        <button class="ph-clear" id="archClear" title="清空屏幕输出">⌫</button>
        <button class="ph-restart" id="archRestart" title="重启（续上次会话）">↺ 重启</button>
      </div>
      <div class="term-wrap" id="archTermEl"></div>
    </div>
    <div class="panel" id="devPanel">
      <div class="panel-header">
        🧑‍💻 开发工程师
        <span class="ph-model" id="devModelBadge"></span>
        <span class="ph-inbox-badge" id="devInboxBadge" title="查看积压消息详情"></span>
        <span class="ph-status" id="devStatus"></span>
        <button class="ph-reconnect" id="devReconnect" title="Reconnect">⟳</button>
        <button class="ph-clear" id="devClear" title="清空屏幕输出">⌫</button>
        <button class="ph-restart" id="devRestart" title="重启（续上次会话）">↺ 重启</button>
      </div>
      <div class="term-wrap" id="devTermEl"></div>
    </div>
    <div class="panel" id="qaPanel" style="display:none">
      <div class="panel-header">
        🔍 QA 工程师
        <span class="ph-model" id="qaModelBadge"></span>
        <span class="ph-inbox-badge" id="qaInboxBadge" title="查看积压消息详情"></span>
        <span class="ph-status" id="qaStatus"></span>
        <button class="ph-reconnect" id="qaReconnect" title="Reconnect">⟳</button>
        <button class="ph-clear" id="qaClear" title="清空屏幕输出">⌫</button>
        <button class="ph-restart" id="qaRestart" title="重启（续上次会话）">↺ 重启</button>
      </div>
      <div class="term-wrap" id="qaTermEl"></div>
    </div>
  </div>

  <div id="relayBar">
    <span id="inboxBadge"></span>
    <button class="relay-btn" id="devToArchBtn" title="手动触发产品架构师审查 Dev 进度">📋 Dev → PA 审查</button>
    <button class="relay-btn" id="devToQaBtn" title="将 Dev 最新输出发给 QA 测试" style="display:none">🔍 Dev → QA 测试</button>
    <button class="relay-btn" id="watchdogBtn" title="定时检查任务是否停滞（5分钟一次）">⏱ Watchdog</button>
    <span id="watchdogBadge"></span>
    <button class="relay-btn" id="memoryBtn" title="查看/编辑 Room 记忆与项目文档">📝 记忆<span id="memoryDot"></span></button>
    <button class="relay-btn" id="commBtn" title="配置通信渠道，让 AI 架构师可主动通知你">📡 通信<span id="commDot"></span></button>
  </div>

  <!-- Comm Panel -->
  <div id="commPanel" style="display:none">
    <div id="commPanelInner">
      <h3>📡 通信配置</h3>
      <div class="comm-section">
        <div class="mem-section-title">通信适配器</div>
        <select class="comm-select" id="commAdapterSelect">
          <option value="">-- 不使用 --</option>
          <option value="feishu">飞书 (Feishu)</option>
        </select>
      </div>
      <div class="comm-section" id="commAdapterSection" style="display:none">
        <div class="mem-section-title">适配器配置</div>
        <div class="comm-env-tip" id="commEnvTip" style="display:none"></div>
        <div class="comm-field" id="commFeishuFields" style="display:none">
          <label class="comm-label">接收 ID (Receive ID)</label>
          <input class="comm-input" id="commReceiveId" type="text" placeholder="oc_xxx (chat_id) 或 ou_xxx (open_id)" spellcheck="false" />
        </div>
        <div class="comm-field" id="commFeishuTypeField" style="display:none">
          <label class="comm-label">ID 类型</label>
          <select class="comm-select" id="commReceiveIdType">
            <option value="chat_id">chat_id（群聊或单聊）</option>
            <option value="open_id">open_id（用户）</option>
            <option value="user_id">user_id（用户）</option>
          </select>
        </div>
        <div class="comm-field">
          <div class="comm-status-row">
            <span class="comm-status-label">连接状态：</span>
            <span id="commStatusDot" class="comm-dot comm-dot-off"></span>
            <span id="commStatusText" class="comm-status-text">未连接</span>
            <button class="comm-reconnect-btn" id="commReconnectBtn">重连</button>
          </div>
          <div id="commErrorMsg" class="comm-error" style="display:none"></div>
        </div>
      </div>
      <div class="comm-field">
        <label class="comm-enable-row">
          <input type="checkbox" id="commEnable" />
          <span>启用通信（架构师输出 <code>[通知]</code> 开头行或调用 notify-user 脚本时自动发送）</span>
        </label>
      </div>
      <div class="mem-actions">
        <button class="mem-save" id="commSaveBtn">保存</button>
        <button class="mem-close" id="commCloseBtn">关闭</button>
      </div>
    </div>
  </div>

  <!-- Memory Panel -->
  <div id="memoryPanel" style="display:none">
    <div id="memoryPanelInner">
      <h3>📝 Room 记忆</h3>
      <div>
        <div class="mem-section-title">Room 记忆（跨会话协作决策）</div>
        <textarea id="memoryTextarea" placeholder="记录跨会话的关键决策、任务状态、约定等…&#10;Agent 可通过 update-room-memory 脚本追加内容。"></textarea>
        <div class="mem-actions" style="margin-top:8px">
          <button class="mem-save" id="memorySaveBtn">保存</button>
          <button class="mem-close" id="memoryCloseBtn">关闭</button>
        </div>
      </div>
      <div>
        <div class="mem-section-title">项目文档（ai-docs）</div>
        <div class="mem-docs" id="memoryDocsList"><div class="mem-docs-empty">加载中…</div></div>
      </div>
    </div>
  </div>
</div>


<script src="/app.js"></script>
</body>
</html>
